seed: 42
multistream_training: true
canonical_data_manifest: data/processed/canonical_datasets.json
# The direct-U parameterization writes to a fresh cohort and never overwrites
# historical pInv/ridge diagnostics.
output_dir: outputs/direct_u_multistream_v1/finetune_seed42
cutoff: 5.0
max_neighbors: 32
embedding_dim: 32
# Used only by the separately reported matched e3nn direct control; PiezoJet's
# production Cartesian encoder does not consume spherical-harmonic lmax.
lmax: 3
num_blocks: 3
radial_basis: 12
radial_hidden: 64
# Stage-A e3nn electrostatic candidates retain the audited full-width encoder
# unless an architecture explicitly declares another width.  A0-PM uses 0.56:
# its three independent towers total 6,358,299 parameters versus 6,454,490 for
# A1 and 6,673,790 for A1.6 under this configuration.
electrostatic_encoder_width_multiplier: 1.0
a0_parameter_matched_width_multiplier: 0.56
cartesian_channels: 48
# Phi and Lambda are independent coefficients of one explicit signed quadratic
# scalar energy. Integrability is enforced by scalar assembly, not by the
# over-restrictive Lambda=B^T K S factorization.
factor_architecture: independent_quadratic_response
global_context_dim: 128
displacement_attention_dim: 64
displacement_cross_rank: 24
spectral_channels: 16
spectral_shells: 8
# Dimensionless physical cutoff |g| V^(1/3) for the complete reciprocal
# shell.  It replaces the former fixed {-1,0,1}^3 integer-index cube.
reciprocal_cutoff: 7.0
polar_fluctuation_shells: 8
# Production optical solve: real Tikhonov variational problem
#   U_delta = argmin_{T^T U=0} 1/2 ||Phi U - rhs||^2 + delta^2/2 ||U||^2.
# The exact stationary inverse is an explicit true-DFPT stable-stratum
# diagnostic only; do not hard-switch on a predicted optical eigenvalue.
optical_solve_policy: tikhonov
optical_stability_cutoff: 0.0001
# Regularization scale (eV/Angstrom^2) for the soft/unstable branch.
optical_regularization: 0.001
# GMTNet dielectric is a total/macro label and must not update the physical
# Z/Phi tower until it has an independent macro head. Same-archive DFPT
# epsilon_ion is the admissible physical self-bilinear target below.
dielectric_loss_weight: 0.0
macro_dielectric_loss_weight: 0.1
# Strict true factors generate the declared regularized ionic softening
# Lambda^T D_delta(Phi) Lambda. This candidate is capacity-tested before use.
# Audited relaxed elastic-total targets are GPa-valued, point-group Reynolds
# projected per material, and present for 3,291 JARVIS/GMTNet intersections.
# The production replay keeps this at zero until a separately registered
# availability-masked auxiliary experiment is selected by validation only.
elastic_loss_weight: 0.0
macro_elastic_loss_weight: 0.0
# Dataset paths are injected from the canonical manifest above. Missing labels
# are availability-masked rather than sourced from an older versioned folder.
# GMTNet raw total and same-ID OUTCAR total match exactly in the current audit.
# These thresholds act only on their actual training targets: the
# Reynolds-projected GMTNet total versus source OUTCAR total.  If both are
# exceeded, retain the GMTNet total objective but mask conflicting DFPT macro
# ionic/electronic/branch response losses pending convention resolution.
dfpt_total_consistency_absolute_tolerance_c_per_m2: 0.05
dfpt_total_consistency_relative_tolerance: 0.05
born_loss_weight: 0.1
# Physical atom-coordinate Hessian and only the symmetry-inequivalent
# internal-strain blocks actually printed by VASP are supervised separately.
force_constant_loss_weight: 0.1
internal_strain_loss_weight: 0.1
internal_strain_full_loss_weight: 0.1
# Isolate Lambda with true DFPT Z* and Phi, and supervise only the observable
# response-active product Z*^T O(Phi) Lambda against the OUTCAR ionic tensor.
response_active_strain_loss_weight: 0.1
# Low optical eigenvalues dominate Phi^-1; supervise them separately from
# dense component MAE.
soft_mode_loss_weight: 0.1
# Production ionic path: factor/Schur response Z*^T Phi^{-1} Lambda (exact on
# true-DFPT-stable spectra, Tikhonov-regularized otherwise).  This is the
# maintained physical mechanism.
ionic_piezo_loss_weight: 1.0
# Direct-U ablation / diagnostic.  Predicts the regularized internal
# displacement response U_eta independently and contracts it with BEC.
# Retained for baseline comparison; default is off for the factor production
# path.
displacement_response_loss_weight: 0.0
# First-order real U/V block residual tied to the former complex resolvent.
# Disabled when the Tikhonov objective is used.
displacement_first_order_consistency_loss_weight: 0.0
max_displacement_consistency_gradient_ratio: 1.0
# Establish nonzero U_eta with true DFPT factors/BECs before the attached
# first-order consistency term is warmed up and ramped.
displacement_pretrain_epochs: 5
displacement_pretrain_learning_rate: 0.0005
displacement_pretrain_target_weight: 1.0
displacement_pretrain_true_born_macro_weight: 1.0
# Preserve the teacher-U AdamW moments instead of restarting that tower at the
# joint boundary.  Its lower LR protects the learned response while the other
# independent towers continue at the registered joint rate below.
preserve_displacement_optimizer_state: true
joint_displacement_learning_rate: 0.0005
collect_u_gradient_diagnostics: false
displacement_consistency_warmup_epochs: 3
displacement_consistency_ramp_epochs: 3
# Compare first-order consistency and direct-target gradients on the U head;
# the actual consistency/direct gradient ratio is capped above.
collect_conditioning_diagnostics: true
electronic_piezo_loss_weight: 1.0
# OUTCAR total = electronic + ionic is already source-audited.  Re-optimizing
# the same identity supplies no new label information and was measured to send
# a 3.7x-larger, opposing gradient into U while the electronic head was still
# inaccurate.  Keep branch-sum closure as a logged diagnostic, not a loss.
branch_sum_loss_weight: 0.0
# Direct-factor curriculum.  Z*, Phi, and printed Lambda are first optimized
# without differentiating through the stiff Phi^+ response product.  The
# internal-strain multiplier compensates its substantially smaller measured
# head-gradient norm; this is a training weight, not label rescaling.
factor_pretrain_epochs: 10
factor_pretrain_learning_rate: 0.0005
factor_pretrain_patience: 0
factor_pretrain_born_weight: 1.0
factor_pretrain_force_weight: 1.0
factor_pretrain_internal_strain_weight: 5.0
factor_pretrain_internal_strain_full_weight: 1.0
factor_pretrain_soft_mode_weight: 1.0
factor_pretrain_response_active_strain_weight: 1.0
batch_size: 128
epochs: 10
early_stopping_patience: 0
# Four checkpoints are always retained.  The 10-material validation TRS is a
# high-variance selector, so the preregistered primary checkpoint minimizes
# the full validation objective; trs_best.pt is reported as a sensitivity
# diagnostic rather than used for the main test table.
checkpoint_selection_metric: loss
learning_rate: 0.001
weight_decay: 0.000001
# Windows workers can exhaust shared-file mappings in long runs.  Cached PBC
# graphs make the stable single-process path sufficiently fast for this corpus.
num_workers: 0
device: auto
pretraining_output_dir: outputs/full_corpus_multitask_detached_lift_v2/pretrain_full_corpus_seed42
pretrained_encoder: outputs/full_corpus_multitask_detached_lift_v2/pretrain_full_corpus_seed42/best_encoder.pt
# Structural pretraining is inductive: its checkpoint may include only this
# panel's training IDs, never the held-out formula groups.
pretrain_epochs: 20
pretrain_learning_rate: 0.0005
mask_probability: 0.15
coordinate_noise_std: 0.02
denoising_weight: 1.0
