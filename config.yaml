seed: 42
data_root: data/raw/gmtnet
processed_dir: data/processed
output_dir: outputs/piezojet_atom_coordinate
cutoff: 5.0
max_neighbors: 32
embedding_dim: 32
# Retained solely by the historical multi-response baseline; PiezoJet's
# production Cartesian encoder does not consume spherical-harmonic lmax.
lmax: 3
num_blocks: 3
radial_basis: 12
radial_hidden: 64
cartesian_channels: 48
# Phi and Lambda are joint derivatives of one signed strain-aware quadratic
# bond energy. Set to legacy only to load historical checkpoints.
factor_architecture: energy_learned_strain
global_context_dim: 128
spectral_channels: 16
spectral_shells: 8
# Dimensionless physical cutoff |g| V^(1/3) for the complete reciprocal
# shell.  It replaces the former fixed {-1,0,1}^3 integer-index cube.
reciprocal_cutoff: 7.0
polar_fluctuation_shells: 8
# Stable predicted optical operators use the exact stationary linear solve.
# Soft/unstable operators use the separately defined signed regularized Green
# operator; this is not described as equilibrium relaxation.
optical_solve_policy: auto
optical_stability_cutoff: 0.0001
# Regularization scale (eV/Angstrom^2) for the soft/unstable branch.
optical_regularization: 0.001
# The same relaxed potential produces a dielectric tensor.  The available
# GMTNet/JARVIS dielectric labels supervise this branch during fine-tuning.
dielectric_loss_weight: 0.1
# Same-source JARVIS raw DFPT labels are opt-in. Populate this directory with
# ``python -m piezojet.jarvis_dfpt --limit ...`` before assigning a nonzero
# weight; missing cache entries are masked rather than fabricated.
jarvis_dfpt_dir: data/processed/jarvis_dfpt_v1
born_loss_weight: 0.1
# Physical atom-coordinate Hessian and only the symmetry-inequivalent
# internal-strain blocks actually printed by VASP are supervised separately.
force_constant_loss_weight: 0.1
internal_strain_loss_weight: 0.1
# Low optical eigenvalues dominate Phi^-1; supervise them separately from
# dense component MAE.
soft_mode_loss_weight: 0.1
# Same-source OUTCAR ionic piezo tensor supervises the complete volume- and
# unit-converted Z* Phi_opt^-1 Lambda product wherever the cache is present.
ionic_piezo_loss_weight: 0.1
# Direct-factor curriculum.  Z*, Phi, and printed Lambda are first optimized
# without differentiating through the stiff Phi^+ response product.  The
# internal-strain multiplier compensates its substantially smaller measured
# head-gradient norm; this is a training weight, not label rescaling.
factor_pretrain_epochs: 0
factor_pretrain_learning_rate: 0.0005
factor_pretrain_patience: 30
factor_pretrain_born_weight: 1.0
factor_pretrain_force_weight: 1.0
factor_pretrain_internal_strain_weight: 5.0
factor_pretrain_soft_mode_weight: 1.0
freeze_factors_during_joint: false
batch_size: 128
epochs: 50
early_stopping_patience: 15
learning_rate: 0.001
weight_decay: 0.000001
# Windows workers can exhaust shared-file mappings in long runs.  Cached PBC
# graphs make the stable single-process path sufficiently fast for this corpus.
num_workers: 0
device: auto
hybrid_full_weight: 0.1
pretraining_output_dir: outputs/pretrain_cartesian
pretrained_encoder: outputs/pretrain_cartesian/best_encoder.pt
pretrain_epochs: 20
pretrain_learning_rate: 0.0005
mask_probability: 0.15
coordinate_noise_std: 0.02
denoising_weight: 1.0
